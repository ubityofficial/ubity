<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="150" r="100" fill="#00d4ff" opacity="0.1"/>
  <circle cx="1050" cy="500" r="120" fill="#0099ff" opacity="0.1"/>
  
  <!-- Main Logo/Title Area -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="140" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">UBITY</text>
  
  <!-- Tagline -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="48" text-anchor="middle" fill="#ffffff" opacity="0.9">
    Build Your Future
  </text>
  
  <!-- Subtext -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#00d4ff" opacity="0.8">
    Join 86+ Innovators
  </text>
  
  <!-- Powered by IMG -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff" opacity="0.6">
    Powered by IMG
  </text>
  
  <!-- Decorative Line -->
  <line x1="200" y1="420" x2="1000" y2="420" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
</svg>
